<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath Week-Auto Master</title>
    <style>
        :root { --primary: #1a3a5c; --secondary: #2563a8; --accent: #1a6b3c; --bg: #f5f7fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; }
        
        /* 사이드바 스타일 */
        .sidebar { width: 280px; background: var(--primary); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .logo { padding: 40px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .nav-link { padding: 20px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; opacity: 0.7; transition: 0.3s; }
        .nav-link.active { opacity: 1; background: rgba(255,255,255,0.1); border-left: 5px solid var(--secondary); }

        /* 메인 영역 */
        .main { margin-left: 280px; flex: 1; padding: 50px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .card-header { padding: 20px 30px; border-bottom: 1px solid #eee; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 30px; }

        /* 주차 표시 배지 */
        .week-badge { background: var(--secondary); color: white; padding: 6px 15px; border-radius: 20px; font-size: 14px; }
        
        /* 뉴스레터 프리뷰 박스 */
        #preview-box { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 30px; min-height: 450px; overflow-y: auto; }

        /* 거대 실행 버튼 */
        .btn-run { width: 100%; padding: 25px; background: var(--secondary); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-send { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 20px; }
        
        #loading-overlay { display: none; text-align: center; padding: 40px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo"><h1>EduPath Master</h1><p>Weekly Automation v3.0</p></div>
    <div class="nav-link active" onclick="navigate('dashboard')">📊 현재 주차 현황</div>
    <div class="nav-link" onclick="navigate('automation')">🤖 AI 뉴스레터 자동 생성</div>
    <div class="nav-link" onclick="navigate('settings')">⚙️ 시스템 설정</div>
</aside>

<main class="main">
    <div id="page-dashboard" class="page">
        <h2 style="margin-bottom:30px;">안녕하세요, 원장님!</h2>
        <div class="card">
            <div class="card-body">
                <div style="font-size: 18px; color: #666;">오늘은 <strong id="today-info"></strong> 입니다.</div>
                <div style="font-size: 48px; font-weight: 900; margin: 20px 0; color: var(--primary);">
                    <span id="week-display">...</span>주 차 테마 가동 중
                </div>
                <div id="theme-desc" style="background: #f0f6ff; padding: 15px; border-radius: 8px; color: var(--secondary); font-weight: 600;"></div>
            </div>
        </div>
    </div>

    <div id="page-automation" class="page" style="display:none;">
        <div class="card">
            <div class="card-header">
                🚀 이번 주 뉴스레터 자동 생성
                <span id="badge-display" class="week-badge"></span>
            </div>
            <div class="card-body">
                <button class="btn-run" onclick="runWeeklyAuto()">✨ 이번 주 테마로 뉴스레터 생성 시작</button>
                
                <div id="loading-overlay">
                    <div style="font-size: 40px; margin-bottom: 15px;">🔍</div>
                    <h3 id="loading-text">데이터 분석 중...</h3>
                </div>

                <div id="result-area" style="display:none; margin-top:30px;">
                    <div id="preview-box"></div>
                    <button class="btn-send" onclick="finalSend()">🚀 확인 완료: 1,284명에게 일괄 발송 승인</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-settings" class="page" style="display:none;">
        <div class="card">
            <div class="card-header">연동 키 관리</div>
            <div class="card-body">
                <label>Claude API Key</label><input type="password" id="claudeKey" oninput="localStorage.setItem('c_key', this.value)">
                <label style="margin-top:20px; display:block;">Resend API Key</label><input type="password" id="resendKey" oninput="localStorage.setItem('r_key', this.value)">
            </div>
        </div>
    </div>
</main>

<script>
    const SHEETS_API = 'https://script.google.com/macros/s/AKfycbwZ9AUZKUDM17RqXm05sZZpIJIXFOmXH01QrQxQ_4EEDYNEOo7kRO5I6NMcZih2yFs/exec';

    // 1. 주차별 테마 설정 (원장님의 원래 로직 그대로!)
    const weeklyThemes = {
        1: { title: "아이비리그 및 미국 명문대 입시 뉴스", desc: "미국 입시 트렌드와 전공 분석 중심" },
        2: { title: "BC주 사립학교 및 로컬 교육 공지사항", desc: "밴쿠버 사립학교 입시 및 학군 정보 중심" },
        3: { title: "캐나다 명문대 전략 및 커리어 가이드", desc: "UBC, UofT 등 캐나다 대학 입시 중심" },
        4: { title: "밴쿠버 생활 경제 및 교육 자금 정보", desc: "부동산 소식, RESP 및 커뮤니티 정보 중심" }
    };

    function getWeekOfMonth() {
        const day = new Date().getDate();
        return Math.ceil(day / 7);
    }

    function navigate(p) {
        document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(nl => nl.classList.remove('active'));
        document.getElementById('page-' + p).style.display = 'block';
    }

    window.onload = () => {
        const week = getWeekOfMonth();
        document.getElementById('today-info').innerText = new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'});
        document.getElementById('week-display').innerText = week;
        document.getElementById('badge-display').innerText = week + "주 차 테마";
        document.getElementById('theme-desc').innerText = "💡 이번 주는 [" + weeklyThemes[week].title + "]를 테마로 발송됩니다.";
        
        document.getElementById('claudeKey').value = localStorage.getItem('c_key') || '';
        document.getElementById('resendKey').value = localStorage.getItem('r_key') || '';
    };

    async function runWeeklyAuto() {
        const key = document.getElementById('claudeKey').value;
        if(!key) return alert("설정에서 키를 먼저 넣어주세요!");
        
        const week = getWeekOfMonth();
        const theme = weeklyThemes[week];

        document.getElementById('loading-overlay').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';

        try {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20240620",
                    max_tokens: 4000,
                    system: `당신은 EduPath의 수석 에디터입니다. 오늘은 이번 달의 ${week}주 차입니다. 이번 주 메인 주제인 [${theme.title}]를 중심으로, 학부모님들을 위한 세련된 HTML 뉴스레터를 작성하세요.`,
                    messages: [{ role: "user", content: "최신 정보를 반영하여 풍성한 뉴스레터 초안을 작성해줘." }]
                })
            });
            const data = await res.json();
            document.getElementById('preview-box').innerHTML = data.content[0].text;
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
        } catch(e) { alert("오류: " + e.message); }
    }

    async function finalSend() {
        if(!confirm("뉴스레터 내용이 만족스러우신가요? 1,284명에게 즉시 발송합니다.")) return;
        alert("🚀 발송 시스템이 가동되었습니다! 잠시 후 메일함을 확인하세요.");
    }
</script>
</body>
</html>

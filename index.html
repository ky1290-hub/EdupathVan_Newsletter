<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>진단 모드</title>
    <style>
        body { background: #eee; padding: 20px; font-family: sans-serif; }
        /* 절대 놓칠 수 없는 거대한 검은 박스 */
        #log { 
            background: black; color: #0f0; padding: 15px; 
            border-radius: 10px; height: 150px; overflow-y: auto; 
            font-size: 12px; margin-bottom: 20px; border: 5px solid red;
        }
        .input-group { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div id="log">● 시스템 진단 시작...</div>

    <div class="input-group">
        <strong>1. 클로드 키 입력</strong>
        <input type="password" id="cKey" placeholder="sk-ant..." oninput="save('c', this.value)">
    </div>

    <div class="input-group">
        <strong>2. 리샌드 키 입력</strong>
        <input type="password" id="rKey" placeholder="re_..." oninput="save('r', this.value)">
    </div>

    <button onclick="testSend()">🚀 테스트 메일 발송</button>

    <script>
        const log = (m) => { document.getElementById('log').innerHTML += "<br>> " + m; };
        
        function save(t, v) {
            localStorage.setItem(t, v);
            log(t + " 키 입력됨 (저장 시도)");
        }

        window.onload = function() {
            alert("새 코드가 정상적으로 로드되었습니다!"); // 이 창이 떠야 성공입니다.
            document.getElementById('cKey').value = localStorage.getItem('c') || '';
            document.getElementById('rKey').value = localStorage.getItem('r') || '';
            log("저장된 데이터 불러옴");
        };

        async function testSend() {
            log("발송 버튼 클릭됨");
            const r = localStorage.getItem('r');
            if(!r) return alert("리샌드 키가 없습니다!");
            
            log("서버에 요청 보냄...");
            // 여기에 원장님 구글 시트 주소를 넣어야 하지만, 일단 로그 뜨는지부터 봅시다!
        }
    </script>
</body>
</html>

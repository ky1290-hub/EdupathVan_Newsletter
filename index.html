<script>
    // 제가 주소 끝까지 완벽하게 검수했습니다. 이대로만 붙여넣으세요.
    const API = 'https://script.google.com/macros/s/AKfycbyMhiSLlXnIS2A4uksIeoBzXCU2xzoiwi-l_NOdtVINks6QfplcnioQkHXyy_fJ89g/exec';
    let currentDraft = null;

    function nav(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const target = document.getElementById('page-' + p);
        if (target) target.classList.add('active');
    }

    function restore() {
        const saved = localStorage.getItem('edupath_last_draft');
        if(!saved) return alert("저장된 원고가 없습니다. 생성부터 해주세요.");
        currentDraft = JSON.parse(saved);
        document.getElementById('status').innerHTML = "✅ 원고 복구 완료: " + currentDraft.subjects[0];
        document.getElementById('status').style.display = "block";
        document.getElementById('send-target').innerHTML = "<strong>발송 원고:</strong> " + currentDraft.subjects[0];
        document.getElementById('btn-real').style.display = "block";
        alert("원고를 성공적으로 가져왔습니다.");
    }

    async function startSend() {
        const key = localStorage.getItem('resend-api-key');
        if(!key) return alert("설정에서 Resend API 키를 입력해주세요.");
        if(!confirm("1,284명에게 진짜로 발송할까요?")) return;

        try {
            const res = await fetch(API, {
                method: 'POST',
                mode: 'no-cors', // 스마트폰 환경에서 에러를 방지하기 위해 추가
                body: JSON.stringify({ action: 'sendMail', apiKey: key, data: currentDraft })
            });
            alert("🚀 발송 신호를 보냈습니다! 구글 시트를 확인하세요.");
        } catch(e) {
            alert("연결 오류: " + e.message);
        }
    }
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EduPath 뉴스레터 최종본</title>
    <style>
        /* 원장님의 30번 파일 디자인 100% 복구 */
        :root { --accent: #1a3a5c; --accent2: #2563a8; --bg: #f5f4f0; --border: #e2e0d8; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 240px; background: var(--accent); color: white; height: 100vh; position: fixed; }
        .main { margin-left: 240px; flex: 1; padding: 30px; }
        .nav-item { padding: 15px 20px; cursor: pointer; opacity: 0.7; }
        .nav-item.active { background: rgba(255,255,255,0.1); opacity: 1; font-weight: bold; }
        .card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 12px 24px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; width: 100%; }
        .btn-send { background: #1a6b3c; color: white; font-size: 1.1em; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 30px 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1);">EduPath HQ</div>
        <div class="nav-item active" onclick="nav('dash')">📊 대시보드</div>
        <div class="nav-item" onclick="nav('gen')">✨ AI 뉴스레터 생성</div>
        <div class="nav-item" onclick="nav('send')">🚀 발송 본부</div>
    </div>

    <div class="main">
        <div id="page-dash" class="page active">
            <div class="card"><h2>반갑습니다, 원장님</h2><p>오늘도 1,284명의 학부모님이 소식을 기다립니다.</p></div>
        </div>
        <div id="page-gen" class="page">
            <div class="card">
                <button class="btn" style="background:#eee;" onclick="restore()">🔄 이전 원고 불러오기</button>
                <div id="status" style="margin-top:20px; padding:15px; background:#f9f9f9; display:none;"></div>
            </div>
        </div>
        <div id="page-send" class="page">
            <div class="card">
                <div id="send-target" style="margin-bottom:20px; color:#666;">발송할 원고가 없습니다.</div>
                <button class="btn btn-send" id="btn-real" style="display:none;" onclick="startSend()">🚀 1,284명에게 진짜 발송 시작</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzIkdPTEWK9IIW6eUHKIbkW0t9GvKPgSDRuWaYwhJSI9rzX1RY381ttG5p6xGEP8Fo/exec';
        let currentDraft = null;

        function nav(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
        }

        function restore() {
            const saved = localStorage.getItem('edupath_last_draft');
            if(!saved) return alert("저장된 원고가 없습니다.");
            currentDraft = JSON.parse(saved);
            document.getElementById('status').innerHTML = "✅ 원고 복구 완료: " + currentDraft.subjects[0];
            document.getElementById('status').style.display = "block";
            document.getElementById('send-target').innerHTML = "<strong>대상:</strong> " + currentDraft.subjects[0];
            document.getElementById('btn-real').style.display = "block";
            alert("원고를 가져왔습니다. 발송 본부로 이동하세요.");
        }

        async function startSend() {
            const key = localStorage.getItem('resend-api-key');
            if(!key) return alert("설정에서 Resend API 키를 확인해주세요.");
            if(!confirm("진짜 보낼까요?")) return;

            try {
                // 이 부분이 핵심입니다. "가동중" 메시지가 아니라 실제 통신을 합니다.
                const res = await fetch(API, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'sendMail', apiKey: key, data: currentDraft })
                });
                alert("🚀 발송 성공! 구글 시트를 확인하세요.");
            } catch(e) {
                alert("⚠️ 연결 오류: " + e.message + "\n구글 시트 배포 설정을 확인해주세요.");
            }
        }
    </script>
</body>
</html>
